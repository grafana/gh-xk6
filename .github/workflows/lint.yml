name: lint
on:
  pull_request:
  workflow_dispatch:
  push:
    paths-ignore:
      - "docs/**"
      - README.md
      - "releases/**"
permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.22.0"
          cache: true
      - name: Go linter
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.63.4
          args: --timeout=30m
          install-mode: binary
